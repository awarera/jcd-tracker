name: JCD Auction Scraper

on:
  schedule:
    # Twice daily. Auctions run through the JST afternoon; these times
    # (UTC) put one run in the Nairobi morning and one in the evening so
    # we catch sold prices soon after auctions close.
    - cron: '0 5 * * *'    # 05:00 UTC = 08:00 Nairobi
    - cron: '0 14 * * *'   # 14:00 UTC = 17:00 Nairobi
  workflow_dispatch:        # manual "Run workflow" button

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 lxml
          python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          JCD_USERNAME: ${{ secrets.JCD_USERNAME }}
          JCD_PASSWORD: ${{ secrets.JCD_PASSWORD }}
          PYTHONUNBUFFERED: "1"
        run: python -u scraper.py
        continue-on-error: true

      - name: Commit updated data
        run: |
          git config user.name  "JCD Scraper Bot"
          git config user.email "bot@jcd-tracker.noreply"
          git add data/
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "scrape: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase --autostash
          git push
